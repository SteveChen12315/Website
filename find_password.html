<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>找回密码 | PRO-LAB (本地版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #0a0a0a; --card: #151515; --border: #333; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .find-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; font-size: 1.2rem; }
        .step { display: none; }
        .step.active { display: block; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i { position: absolute; left: 12px; top: 12px; color: #555; }
        input { width: 100%; padding: 10px 10px 10px 35px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; outline: none; }
        .btn-action { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .q-text { color: var(--primary); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .info-box { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px; line-height: 1.6; }
        code { background: #000; padding: 2px 5px; color: #ff00ff; }
    </style>
</head>
<body>

<div class="find-card">
    <h2>找回您的密码</h2>

    <div id="step1" class="step active">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="find_user" placeholder="请输入用户名">
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="find_email" placeholder="注册时的邮箱">
        </div>
        <button class="btn-action" onclick="verifyIdentity()">下一步：验证密保</button>
    </div>

    <div id="step2" class="step">
        <span class="q-text" id="displayQuestion">密保问题加载中...</span>
        <div class="input-group">
            <i class="fas fa-shield-alt"></i>
            <input type="text" id="find_answer" placeholder="请输入密保答案">
        </div>
        <button class="btn-action" onclick="verifyAnswer()">下一步：生成新哈希</button>
    </div>

    <div id="step3" class="step">
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="new_pass" placeholder="输入想设置的新密码">
        </div>
        <button class="btn-action" onclick="generateNewHash()">生成新哈希值</button>
        
        <div id="manualGuidance" style="display:none;" class="info-box">
            <p><i class="fas fa-exclamation-triangle"></i> 验证成功！由于您使用的是本地 CSV 部署，网页无法直接修改您的文件。请执行以下操作：</p>
            <ol>
                <li>打开 <code>C:\Website\Database\users_rows.csv</code></li>
                <li>找到用户 <strong id="targetName" style="color:var(--primary)"></strong></li>
                <li>将 <code>password_hash</code> 列的内容替换为：</li>
            </ol>
            <textarea id="hashResult" style="width:100%; height:60px; background:#000; color:#0f0; border:1px solid #333; font-family:monospace; font-size:12px; padding:5px; margin-top:5px;" readonly></textarea>
            <button class="btn-action" style="background:#333; color:#fff;" onclick="window.location.href='login.html'">完成后去登录</button>
        </div>
    </div>

    <p style="text-align:center; font-size:12px; margin-top:20px;">
        <a href="login.html" style="color:#666; text-decoration:none;">返回登录页面</a>
    </p>
</div>

<script>
    // CSV 本地相对路径
    const CSV_PATH = 'Database/users_rows.csv';
    let targetUser = null;

    // 解析 CSV 函数
    async function loadUsersDB() {
        try {
            const response = await fetch(CSV_PATH);
            const csvText = await response.text();
            return new Promise((resolve) => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data)
                });
            });
        } catch (e) {
            alert("读取本地数据库失败，请确认通过服务器访问且文件路径正确。");
            return [];
        }
    }

    // SHA-256 哈希函数
    async function hashPassword(password) {
        const msgUint8 = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 1. 验证用户名和邮箱
    async function verifyIdentity() {
        const u = document.getElementById('find_user').value.trim();
        const e = document.getElementById('find_email').value.trim();
        if(!u || !e) return alert("请填写完整");

        const users = await loadUsersDB();
        const user = users.find(row => row.username === u && row.email === e);

        if (!user) {
            alert("用户名或邮箱错误");
        } else {
            targetUser = user;
            document.getElementById('displayQuestion').innerText = "密保问题：" + (user.security_question || "未设置问题");
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
    }

    // 2. 验证密保答案
    function verifyAnswer() {
        const ans = document.getElementById('find_answer').value.trim();
        if (ans === targetUser.security_answer) {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
        } else {
            alert("密保答案错误！");
        }
    }

    // 3. 生成新哈希值（替代原本的 SQL Update 操作）
    async function generateNewHash() {
        const p1 = document.getElementById('new_pass').value;
        if (p1.length < 6) return alert("新密码至少6位");

        const hashed = await hashPassword(p1);
        
        document.getElementById('targetName').innerText = targetUser.username;
        document.getElementById('hashResult').value = hashed;
        document.getElementById('manualGuidance').style.display = 'block';
    }
</script>
</body>
</html>
