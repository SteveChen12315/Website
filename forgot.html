<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RESET ACCESS</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0a0a0a; padding: 40px; border: 1px solid #1a1a1a; width: 380px; box-shadow: 0 0 30px rgba(0,0,0,1); }
        h2 { text-align: center; letter-spacing: 3px; margin-bottom: 30px; color: var(--accent); }
        .field { margin-bottom: 15px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--accent); box-sizing: border-box; outline: none; }
        .code-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--accent); color: #000; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #444; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>RESET PASSWORD</h2>
        <div class="field">
            <label>Registered Email</label>
            <div class="code-group">
                <input type="email" id="email" placeholder="Email">
                <button style="width:120px; font-size:11px" onclick="sendCode()">GET CODE</button>
            </div>
        </div>
        <div class="field">
            <label>Verification Code</label>
            <input type="text" id="code" placeholder="6-Digit Code">
        </div>
        <div class="field">
            <label>New Secret Credential</label>
            <input type="password" id="pass" placeholder="New Password">
        </div>
        <button onclick="doReset()">UPDATE ACCESS</button>
        <div class="back"><a href="login.html">BACK TO LOGIN</a></div>
    </div>
    <script>
        async function sendCode() {
            const email = document.getElementById('email').value;
            await fetch('http://127.0.0.1:3000/api/send-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            alert("验证码已发送，5分钟内有效");
        }
        async function doReset() {
            const res = await fetch('http://127.0.0.1:3000/api/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    code: document.getElementById('code').value,
                    new_password: document.getElementById('pass').value
                })
            });
            const data = await res.json();
            if(data.success) { alert("重置成功"); location.href='login.html'; } else { alert(data.message); }
        }
    </script>
</body>
</html>
