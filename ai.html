<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuan | AI Matrix Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #0a0a0a; --card: #151515; --border: #333; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; justify-content: space-between; }
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; }
        .logo-img { height: 30px; filter: drop-shadow(0 0 5px var(--primary)); }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .status-tag { font-size: 0.7rem; color: #555; border: 1px solid #222; padding: 4px 10px; border-radius: 20px; }
        .status-tag.active { color: var(--primary); border-color: var(--primary); }

        .chat-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 1000px; margin: 20px auto; width: 95%; background: var(--card); border: 1px solid var(--border); border-radius: 20px; position: relative; overflow: hidden; }
        #chatBox { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 18px; line-height: 1.6; font-size: 0.95rem; }
        .user-msg { align-self: flex-end; background: var(--primary); color: #000; font-weight: 600; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #1a1a1a; border: 1px solid var(--border); color: #eee; border-bottom-left-radius: 2px; }

        /* --- API Management Panel --- */
        #settingsPanel {
            position: absolute; top: 0; right: 0; width: 350px; height: 100%; 
            background: #111; border-left: 1px solid var(--border); z-index: 100;
            padding: 25px; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #settingsPanel.open { transform: translateX(0); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .config-list { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .config-item { 
            background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; 
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; position: relative;
        }
        .config-item.active { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
        .config-item h4 { font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
        .config-item p { font-size: 0.7rem; color: #555; }
        .delete-config { position: absolute; top: 10px; right: 10px; color: #444; font-size: 0.8rem; }
        .delete-config:hover { color: #ff4d4d; }

        .add-form { border-top: 1px solid #222; padding-top: 20px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8rem; outline: none; }
        .btn-action { width: 100%; background: var(--primary); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .input-area { padding: 20px; background: #0d0d0d; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        #userInput { flex: 1; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-box">
        <img src="index/Logo.png" class="logo-img">
        <span>AI MATRIX</span>
    </a>
    <div class="nav-right">
        <div id="activeModelTag" class="status-tag">NO ACTIVE KEY</div>
        <button class="btn-action" style="width: auto; padding: 5px 15px;" onclick="toggleSettings()">
            <i class="fas fa-sliders-h"></i> CONFIGS
        </button>
    </div>
</header>

<div class="chat-wrapper">
    <div id="settingsPanel">
        <div class="panel-header">
            <span style="font-weight: bold; color: var(--primary);">MY API KEYS</span>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleSettings()"></i>
        </div>
        
        <div class="config-list" id="configList">
            </div>

        <div class="add-form">
            <p style="font-size: 0.75rem; margin-bottom: 10px; color: #888;">ADD NEW CONFIG</p>
            <input type="text" id="newName" placeholder="Config Name (e.g. Work-Qwen)">
            <input type="password" id="newKey" placeholder="DashScope API Key">
            <input type="text" id="newModel" placeholder="Model (default: qwen-plus)" value="qwen-plus">
            <button class="btn-action" onclick="saveNewConfig()">SAVE TO CLOUD</button>
        </div>
    </div>

    <div id="chatBox">
        <div class="msg ai-msg">Initializing cloud connection...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask AI..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button class="btn-action" style="width: 50px;" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    const SB_URL = 'https://bwbmnaobukcjatwevcqm.supabase.co';
    const SB_KEY = 'sb_publishable_2Pt8kRnWJCI17rA7CGgjyA_lsIhFE4T'; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const userData = JSON.parse(localStorage.getItem('lab_user'));
    let currentConfigs = [];
    let activeConfig = null;

    if (!userData) { window.location.href = 'login.html'; }

    async function fetchConfigs() {
        const { data, error } = await _supabase
            .from('ai_configs')
            .select('*')
            .eq('user_id', userData.username)
            .order('created_at', { ascending: false });

        if (error) return console.error(error);
        currentConfigs = data;
        renderConfigs();
    }

    function renderConfigs() {
        const listDiv = document.getElementById('configList');
        activeConfig = currentConfigs.find(c => c.is_active) || currentConfigs[0] || null;
        
        document.getElementById('activeModelTag').innerText = activeConfig ? activeConfig.model_name.toUpperCase() : 'NO KEY';
        document.getElementById('activeModelTag').className = activeConfig ? 'status-tag active' : 'status-tag';

        listDiv.innerHTML = currentConfigs.map(c => `
            <div class="config-item ${activeConfig && c.id === activeConfig.id ? 'active' : ''}" onclick="setActiveConfig('${c.id}')">
                <h4>${c.config_name}</h4>
                <p>${c.model_name} | Key: ****${c.api_key.slice(-4)}</p>
                <i class="fas fa-trash-alt delete-config" onclick="event.stopPropagation(); deleteConfig('${c.id}')"></i>
            </div>
        `).join('');
    }

    async function saveNewConfig() {
        const name = document.getElementById('newName').value.trim();
        const key = document.getElementById('newKey').value.trim();
        const model = document.getElementById('newModel').value.trim();

        if (!name || !key) return alert("Name and Key are required!");

        const { error } = await _supabase.from('ai_configs').insert([{
            user_id: userData.username,
            config_name: name,
            api_key: key,
            model_name: model || 'qwen-plus',
            is_active: currentConfigs.length === 0 // 如果是第一个，设为激活
        }]);

        if (!error) {
            document.getElementById('newName').value = '';
            document.getElementById('newKey').value = '';
            fetchConfigs();
        }
    }

    async function setActiveConfig(id) {
        // 先把该用户所有的设为 false
        await _supabase.from('ai_configs').update({ is_active: false }).eq('user_id', userData.username);
        // 再把选中的设为 true
        await _supabase.from('ai_configs').update({ is_active: true }).eq('id', id);
        fetchConfigs();
    }

    async function deleteConfig(id) {
        if (!confirm("Delete this API configuration?")) return;
        await _supabase.from('ai_configs').delete().eq('id', id);
        fetchConfigs();
    }

    function toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('open');
    }

    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const query = inputField.value.trim();
        if (!query || !activeConfig) return alert("Select an active API config first!");

        appendMessage('user', query);
        inputField.value = '';
        const loadingDiv = appendMessage('ai', '<i class="fas fa-spinner fa-spin"></i> Analyzing via Matrix...');

        try {
            const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${activeConfig.api_key}`
                },
                body: JSON.stringify({
                    model: activeConfig.model_name,
                    messages: [
                        { role: 'system', content: 'Professional proteomics assistant. Answer in English.' },
                        { role: 'user', content: query }
                    ]
                })
            });
            const data = await response.json();
            loadingDiv.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
        } catch (e) {
            loadingDiv.innerHTML = "Signal Error: Check API Key or balance.";
        }
    }

    function appendMessage(role, text) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}-msg`;
        msgDiv.innerHTML = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    // 初始加载
    fetchConfigs();
    setTimeout(() => {
        document.querySelector('.ai-msg').innerHTML = `Cloud link established. Ready for commands, ${userData.username.toUpperCase()}.`;
    }, 1000);
</script>
</body>
</html>
