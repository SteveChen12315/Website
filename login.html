<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL LOGIN</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #0a0a0a; padding: 40px; border: 1px solid #1a1a1a; width: 360px; box-shadow: 0 0 30px rgba(0,0,0,1); position: relative; }
        h2 { text-align: center; letter-spacing: 5px; margin-bottom: 30px; font-weight: 300; }
        .field { margin-bottom: 20px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--accent); box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        #secret-area { display: none; margin-top: 15px; border-left: 2px solid var(--accent); padding-left: 15px; }
        button { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
        button:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        button:disabled { opacity: 0.5; cursor: wait; border-color: #444; color: #444; }
        #msg { font-size: 12px; text-align: center; margin-top: 20px; color: #666; min-height: 15px; }
        .links { margin-top: 25px; display: flex; justify-content: space-between; }
        .links a { color: #aaa; text-decoration: none; font-size: 11px; transition: 0.3s; }
        .links a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <h2>CORE LOGIN</h2>
        <div class="field">
            <label>IDENTIFIER</label>
            <input type="text" id="user" oninput="toggleSecret()" placeholder="Username" autocomplete="off">
        </div>
        <div class="field">
            <label>ACCESS CREDENTIAL</label>
            <input type="password" id="pass" placeholder="Password">
        </div>
        <div id="secret-area">
            <label>SECURITY SECRET KEY</label>
            <input type="password" id="secret" placeholder="Secret Key">
        </div>
        <button id="loginBtn" onclick="doLogin()">EXECUTE ACCESS</button>
        <div id="msg">SYSTEM READY</div>
        <div class="links">
            <a href="register.html">CREATE ACCOUNT</a>
            <a href="forgot.html">RESET ACCESS</a>
        </div>
    </div>

    <script>
        function toggleSecret() {
            const u = document.getElementById('user').value.toLowerCase();
            const area = document.getElementById('secret-area');
            area.style.display = (u.includes('boss') || u.startsWith('admin_')) ? 'block' : 'none';
        }

        async function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const s = document.getElementById('secret').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');

            if(!u || !p) return;

            // 前端锁定与 3 秒延迟提示
            btn.disabled = true;
            btn.innerText = "VERIFYING...";
            msg.innerText = "SECURITY SCAN IN PROGRESS (3S)...";
            msg.style.color = "#888";

            try {
                const res = await fetch('http://127.0.0.1:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, secret: s })
                });
                const data = await res.json();
                
                if (data.success) {
                    msg.style.color = "#00ff88";
                    msg.innerText = "ACCESS GRANTED";
                    localStorage.setItem('lab_user', JSON.stringify(data.user));
                    setTimeout(() => location.href = 'index.html', 800);
                } else {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "DENIED: " + data.message;
                    btn.disabled = false;
                    btn.innerText = "EXECUTE ACCESS";
                }
            } catch (e) {
                msg.innerText = "OFFLINE: SERVER UNREACHABLE";
                btn.disabled = false;
                btn.innerText = "EXECUTE ACCESS";
            }
        }
    </script>
</body>
</html>
