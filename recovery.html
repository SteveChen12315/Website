<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>账号找回 | PRO-LAB 安全系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --bg: #050505; --card: #111; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'PingFang SC', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .card { 
            background: rgba(255,255,255,0.03); 
            padding: 2.5rem; 
            border-radius: 20px; 
            width: 380px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; 
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { color: var(--primary); letter-spacing: 2px; margin-bottom: 5px; }
        p { font-size: 0.8rem; color: #666; margin-bottom: 25px; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 12px; top: 14px; color: #444; }
        input { 
            width: 100%; padding: 12px 12px 12px 40px; 
            background: #000; border: 1px solid #222; 
            color: white; border-radius: 8px; box-sizing: border-box; 
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        
        button { 
            width: 100%; padding: 14px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: bold; 
            background: var(--primary); color: #000; 
            margin-top: 10px; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        #result { 
            margin-top: 20px; padding: 15px; border-radius: 10px; 
            background: rgba(0,210,255,0.1); border: 1px dashed var(--primary);
            display: none; word-break: break-all; animation: fadeIn 0.5s;
        }
        .back { display: block; margin-top: 20px; color: #555; font-size: 0.8rem; text-decoration: none; transition: 0.3s; }
        .back:hover { color: var(--primary); }

        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-key"></i> RECOVERY</h2>
        <p>通过备份库检索您的原始密码</p>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="rec_user" placeholder="用户名">
        </div>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="rec_email" placeholder="注册邮箱 (可选)">
        </div>

        <button onclick="handleRecovery()">检索备份密码</button>
        
        <div id="result"></div>
        
        <a href="login.html" class="back"><i class="fas fa-chevron-left"></i> 返回登录</a>
    </div>

    <script>
        // 指向你本地的密码备份 CSV 文件
        const BACKUP_CSV = 'Database/credentials_backup_rows.csv';

        async function handleRecovery() {
            const userInp = document.getElementById('rec_user').value.trim();
            const emailInp = document.getElementById('rec_email').value.trim();
            const resDiv = document.getElementById('result');

            if(!userInp) return alert("请输入用户名");

            try {
                // 1. 读取本地备份文件
                const response = await fetch(BACKUP_CSV);
                const csvText = await response.text();
                
                // 2. 解析 CSV
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const backups = results.data;
                        
                        // 3. 匹配用户名（不强制校验邮箱，方便你自己找回）
                        const record = backups.find(r => r.username.toLowerCase() === userInp.toLowerCase());

                        if (record) {
                            resDiv.style.display = "block";
                            resDiv.innerHTML = `
                                <div style="font-size:0.75rem; color:var(--primary); margin-bottom:5px;">匹配成功！您的明文密码为：</div>
                                <div style="font-size:1.2rem; font-weight:bold; letter-spacing:1px; color:#fff;">${record.plain_password}</div>
                                <div style="font-size:0.7rem; color:#555; margin-top:10px;">备份时间: ${record.backup_date || '未知'}</div>
                            `;
                        } else {
                            alert("备份库中未找到该用户的记录。");
                            resDiv.style.display = "none";
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                alert("无法访问备份库，请确认 Database 文件夹路径正确。");
            }
        }
    </script>
</body>
</html>
